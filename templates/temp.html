<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OCR</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="flex flex-row items-center justify-center space-x-20">
      <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-4 text-center">
          Upload Aadhaar Front and Back for OCR
        </h2>

        <form id="uploadForm">
          <label class="block mb-1 font-medium">Front Side (Image 1)</label>
          <input
            type="file"
            name="image1"
            accept="image/*"
            required
            class="mb-2 block w-full"
          />
          <img
            id="preview1"
            class="mb-4 w-full object-contain max-h-60 rounded border"
            style="display: none"
          />

          <label class="block mb-1 font-medium"
            >Back Side (Image 2, Optional)</label
          >
          <input type="file" name="image2" accept="image/*" />
          <img
            id="preview2"
            class="mb-4 w-full object-contain max-h-60 rounded border"
            style="display: none"
          />

          <select name="form_type" id="form_type">
            <option value="new">New</option>
            <option value="correction">Correction</option>
          </select>

          <button
            type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 w-full"
          >
            Upload
          </button>
        </form>

        <div class="mt-6">
          <button
            id="copyBtn"
            class="mt-2 bg-gray-200 text-gray-700 px-3 py-1 rounded hover:bg-gray-300"
          >
            Copy
          </button>
          <div id="result" class="text-sm whitespace-pre-wrap"></div>
        </div>
      </div>

      <!-- second half div  -->
      <div>
        <h1 class="font-bold text-2xl font-2xl">PDF,Photo and sign upload</h1>

        <form id="uploadform">
          <p>upload pdf here</p>
          <input type="file" id="pdf" required />
          <p>upload photo here</p>
          <input type="file" id="photo" required />
          <p>upload sign here</p>
          <input type="file" id="sign" required />

          <select name="form_typee" id="form_typee">
            <option value="new">New</option>
            <option value="correction">Correction</option>
          </select>

          <button class="px-5 font-bold bg-red-500 text-white" type="submit">
            Download
          </button>
        </form>
      </div>
    </div>

    <!-- script for pages  -->
    <script>
      let form_typee = document.getElementById("form_typee");
      document.getElementById("uploadform").addEventListener("submit", (e) => {
        e.preventDefault();
        let formdata = new FormData();
        formdata.append("pdf", document.getElementById("pdf").files[0]);
        formdata.append("photo", document.getElementById("photo").files[0]);
        formdata.append("sign", document.getElementById("sign").files[0]);

        if (form_typee.value == "correction") {
          fetch("/convertCorrection", {
            method: "POST",
            body: formdata,
          })
            .then((response) => response.blob())
            .then((blob) => {
              const url = window.URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = "output.zip";
              document.body.appendChild(a);
              a.click();
              a.remove();
            });
        }else{
        fetch("/convert", {
          method: "POST",
          body: formdata,
        })
          .then((response) => response.blob())
          .then((blob) => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "output.zip";
            document.body.appendChild(a);
            a.click();
            a.remove();
          });
      }
    })
    </script>

    <script>
      const form = document.getElementById("uploadForm");
      const resultDiv = document.getElementById("result");
      const preview1 = document.getElementById("preview1");
      const preview2 = document.getElementById("preview2");
      let form_type = document.getElementById("form_type");

      form.image1.addEventListener("change", (e) => {
        if (e.target.files[0]) {
          preview1.src = URL.createObjectURL(e.target.files[0]);
          preview1.style.display = "block";
        }
      });

      form.image2.addEventListener("change", (e) => {
        if (e.target.files[0]) {
          preview2.src = URL.createObjectURL(e.target.files[0]);
          preview2.style.display = "block";
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        resultDiv.innerText = "Processing...";

        const file1 = form.image1.files[0];
        const file2 = form.image2.files[0];

        if (!file1) {
          resultDiv.innerText = "Please select the front image.";
          return;
        }

        const img1 = await loadImage(file1);
        let finalBlob;

        if (file2) {
          const img2 = await loadImage(file2);

          const canvas = document.createElement("canvas");
          const width = Math.max(img1.width, img2.width);
          const height = img1.height + img2.height;

          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "white";
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img1, 0, 0);
          ctx.drawImage(img2, 0, img1.height);

          finalBlob = await new Promise((resolve) => {
            canvas.toBlob((blob) => resolve(blob), "image/jpeg", 0.95);
          });
        } else {
          finalBlob = file1;
        }

        const formData = new FormData();
        formData.append("image", finalBlob, "combined.jpg");

        let response; 

        try {
          if (form_type.value == "new") {
            response = await fetch("/upload", {
              method: "POST",
              body: formData,
            });
          } else {
            response = await fetch("/correctionUpload", {
              method: "POST",
              body: formData,
            });
          }

          if (!response.ok) {
            throw new Error(await response.text());
          }

          // Expect plain text response
          const text = await response.text();
          resultDiv.innerText = text;
        } catch (err) {
          resultDiv.innerText = "Error: " + err.message;
        }
      });

      function loadImage(file) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = URL.createObjectURL(file);
        });
      }

      // Copy button handling for #result
      const copyBtn = document.getElementById("copyBtn");
      if (copyBtn) {
        copyBtn.addEventListener("click", async () => {
          try {
            const text = resultDiv.innerText || "";
            await navigator.clipboard.writeText(text);
            const original = copyBtn.innerText;
            copyBtn.innerText = "Copied!";
            setTimeout(() => {
              copyBtn.innerText = original;
            }, 1500);
          } catch (err) {
            console.error("Copy failed", err);
            copyBtn.innerText = "Failed";
            setTimeout(() => {
              copyBtn.innerText = "Copy";
            }, 1500);
          }
        });
      }
    </script>
  </body>
</html>
